<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <!-- 关键：referrer 策略与成功案例保持一致 -->
    <meta name="referrer" content="no-referrer">
    <title>App Store 预览 · LumiNya</title>
    <style>
        /* 全局重置 & 苹果风格字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }

        /* 主卡片 —— 仿 App Store 应用卡片 */
        .app-card {
            background-color: #ffffff;
            max-width: 400px;
            width: 100%;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15), 0 5px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding: 32px 24px 28px 24px;
            transition: transform 0.2s ease;
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(0, 0, 0, 0.04);
        }

        /* 顶部图标区域：居中，带一点投影 */
        .icon-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .app-icon {
            width: 140px;
            height: 140px;
            border-radius: 31px;
            box-shadow: 0 12px 25px -6px rgba(0, 0, 0, 0.25), 0 4px 8px rgba(0, 0, 0, 0.02);
            object-fit: cover;
            background-color: #f0f0f3;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.15s ease;
        }

        .app-icon:hover {
            transform: scale(1.02);
        }

        /* 应用名称 & 开发者 */
        .app-name {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
            text-align: center;
            color: #1d1c1f;
            margin-bottom: 6px;
        }

        .developer {
            font-size: 17px;
            font-weight: 400;
            color: #86868b;
            text-align: center;
            margin-bottom: 20px;
        }

        /* 获取按钮 —— 稍微调小了一点 */
        .button-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .get-button {
            background-color: #007aff;
            border: none;
            border-radius: 40px;
            padding: 12px 48px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 5px 15px -5px #007aff80;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            letter-spacing: -0.01em;
            outline: none;
            width: fit-content;
            min-width: 160px;
        }

        .get-button:active {
            background-color: #005bbf;
            transform: scale(0.97);
            box-shadow: 0 3px 8px -3px #007affb3;
        }

        .get-button:disabled {
            background-color: #a0c4ff;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 信息列表 (仿 App Store 数据表格) */
        .info-grid {
            background-color: #f8f8fc;
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 22px;
            border: 1px solid #f0f0f2;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid #e9e9ed;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 16px;
            font-weight: 400;
            color: #6c6c74;
        }

        .info-value {
            font-size: 16px;
            font-weight: 500;
            color: #1d1c1f;
            text-align: right;
        }

        /* 描述文本 */
        .description {
            font-size: 16px;
            line-height: 1.45;
            color: #3a3a44;
            background-color: #ffffff;
            padding: 6px 8px;
            margin-bottom: 6px;
            font-weight: 400;
        }

        /* 动态提示区域 */
        .install-tip {
            margin-top: 16px;
            padding: 14px 12px;
            background-color: #f0f0f5;
            border-radius: 16px;
            font-size: 15px;
            color: #1d1c1f;
            text-align: center;
            line-height: 1.5;
            border: 0.5px solid rgba(0,0,0,0.04);
            display: none;
        }
        .install-tip strong {
            color: #007aff;
        }
        .install-tip .orange {
            color: #e67e22;
            font-weight: 500;
        }

        .hint-note {
            font-size: 15px;
            color: #86868b;
            text-align: center;
            margin-top: 12px;
            border-top: 1px solid #e9e9ed;
            padding-top: 18px;
        }

        /* 简单响应式 */
        @media (max-width: 420px) {
            .app-card {
                padding: 24px 18px 20px 18px;
                border-radius: 24px;
            }
            .app-icon {
                width: 120px;
                height: 120px;
                border-radius: 26px;
            }
            .app-name {
                font-size: 26px;
            }
            .get-button {
                padding: 10px 38px;
                font-size: 18px;
                min-width: 140px;
            }
        }

        /* 模拟 App Store 导航小标记 */
        .app-store-badge {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 0 6px;
            color: #007aff;
            font-weight: 500;
            font-size: 20px;
            letter-spacing: -0.02em;
        }
        .badge-left {
            font-size: 26px;
            font-weight: 700;
            color: #1d1c1f;
        }
        .badge-right {
            font-size: 17px;
            color: #007aff;
            font-weight: 500;
        }
        hr {
            border: none;
            border-top: 1px solid #e9e9ed;
            margin: 18px 0 12px 0;
        }
    </style>
</head>
<body>
    <div class="app-card">
        <!-- 顶部仿导航栏 -->
        <div class="app-store-badge">
            <span class="badge-left">App Store</span>
            <span class="badge-right">应用程序</span>
        </div>

        <!-- 应用图标 -->
        <div class="icon-wrapper">
            <img class="app-icon" src="img/logo.webp" alt="LumiNya 图标"
                 onerror="this.onerror=null; this.src='data:image/svg+xml,...';" />
        </div>

        <h1 class="app-name">LumiNya</h1>
        <p class="developer">开发者: LumiNya</p>

        <!-- 获取按钮 -->
        <div class="button-wrapper">
            <button class="get-button" id="getProfileBtn">获取</button>
        </div>

        <!-- 信息列表 -->
        <div class="info-grid">
            <div class="info-row"><span class="info-label">年龄分级</span><span class="info-value">3+</span></div>
            <div class="info-row"><span class="info-label">类别</span><span class="info-value">工具</span></div>
            <div class="info-row"><span class="info-label">更新日期</span><span class="info-value">2026.03.02</span></div>
            <div class="info-row"><span class="info-label">版本</span><span class="info-value">1.20.1-1</span></div>
            <div class="info-row"><span class="info-label">语言</span><span class="info-value">简体中文</span></div>
        </div>

        <p class="description">⚙️ LumiNya的app。点击「获取」开始安装描述文件。</p>
        
        <!-- 动态安装提示区域 -->
        <div id="installTip" class="install-tip"></div>

        <div class="hint-note">兼容性 · 需要 iOS 14.0 或更高版本</div>
    </div>

    <script>
        (function() {
            'use strict';

            const btn = document.getElementById('getProfileBtn');
            const tipDiv = document.getElementById('installTip');
            let countdownInterval = null;
            let configIframe = null;
            let fakeIframe = null;

            // 获取 iOS 版本号
            function getIOSVersion() {
                const match = navigator.userAgent.match(/OS (\d+)_/);
                return match ? parseInt(match[1], 10) : 0;
            }

            // 移除已存在的 iframe
            function removeIframes() {
                if (configIframe && configIframe.parentNode) {
                    configIframe.parentNode.removeChild(configIframe);
                    configIframe = null;
                }
                if (fakeIframe && fakeIframe.parentNode) {
                    fakeIframe.parentNode.removeChild(fakeIframe);
                    fakeIframe = null;
                }
            }

            // 开始倒计时
            function startCountdown(seconds) {
                let remaining = seconds;
                tipDiv.style.display = 'block';
                tipDiv.innerHTML = `请 <strong>允许下载</strong> ${remaining}...`;

                countdownInterval = setInterval(() => {
                    remaining -= 1;
                    if (remaining > 0) {
                        tipDiv.innerHTML = `请 <strong>允许下载</strong> ${remaining}...`;
                    } else {
                        clearInterval(countdownInterval);
                        countdownInterval = null;

                        // 检测 iOS 版本并加载备用 mobileprovision（与成功案例一致）
                        const iosVer = getIOSVersion();
                        if (iosVer < 17 && fakeIframe) {
                            fakeIframe.src = 'https://assets3.pgyer.com/static/assets/mobileprovision/embedded9.mobileprovision';
                        }

                        tipDiv.innerHTML = `
                            <span style="font-weight:600;">已完成，请安装！</span><br>
                            <span class="orange">如果未自动跳转到安装<br>请进入系统 <strong>设置</strong> &gt; <strong>已下载描述文件</strong> 安装！<br>
                            或者进入系统 <strong>设置</strong> &gt; <strong>通用</strong> &gt; <strong>VPN与设备管理</strong> 安装！</span>
                        `;

                        btn.disabled = false;
                        btn.innerText = '再次获取';
                    }
                }, 1000);
            }

            btn.addEventListener('click', function(e) {
                e.preventDefault();
                if (btn.disabled) return;

                btn.disabled = true;
                btn.innerText = '获取中...';

                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }

                removeIframes();

                // 创建第一个 iframe 加载描述文件（立即触发请求）
                configIframe = document.createElement('iframe');
                configIframe.style.position = 'absolute';
                configIframe.style.width = '0';
                configIframe.style.height = '0';
                configIframe.style.border = '0';
                configIframe.style.visibility = 'hidden';
                configIframe.src = '/src/app/luminya.mobileconfig?t=' + Date.now();
                document.body.appendChild(configIframe);

                // 创建第二个 iframe (fake)，初始空白
                fakeIframe = document.createElement('iframe');
                fakeIframe.style.position = 'absolute';
                fakeIframe.style.width = '0';
                fakeIframe.style.height = '0';
                fakeIframe.style.border = '0';
                fakeIframe.style.visibility = 'hidden';
                fakeIframe.src = 'about:blank';
                document.body.appendChild(fakeIframe);

                // 开始倒计时 3 秒
                startCountdown(3);

                // 重要：如果服务器 MIME 类型正确，iOS 将在 iframe 请求响应后立即弹窗
                // 若仍然只下载文件，请检查服务器配置
                console.log('描述文件请求已发送，请确保服务器返回 Content-Type: application/x-apple-aspen-config');
            });

            // 控制台提示
            console.log('LumiNya 预览页已加载，点击获取将触发描述文件安装');
        })();
    </script>
</body>
</html>
