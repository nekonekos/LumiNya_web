<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>湖北省高中阶段学校招生管理信息系统</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif}
        body {background:#f4f6f8; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px}
        .card {width:100%; max-width:420px; background:#fff; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.06); padding:26px}
        .logo-box{width:64px;height:64px;margin:0 auto 10px;border-radius:8px;background:linear-gradient(135deg,#0a84ff,#00b4ff)}
        .system-title{text-align:center;color:#0077bb;font-size:18px;margin-bottom:18px;font-weight:600}
        .input-wrap{display:flex;flex-direction:column;gap:12px}
        .input-item{display:flex;align-items:center;background:#fff;border:1px solid #e6e9ee;border-radius:8px;padding:12px}
        .icon-area{width:36px;font-size:18px;color:#0077bb;display:flex;align-items:center;justify-content:center}
        .split-line{width:1px;height:28px;background:#eee;margin:0 10px}
        .input-field{flex:1;border:none;outline:none;font-size:15px;color:#222}
        .eye-btn{background:transparent;border:none;font-size:18px;cursor:pointer}
        .code-row{display:flex;gap:12px}
        .code-input-box{flex:1;display:flex;align-items:center;border:1px solid #e6e9ee;border-radius:8px;padding:10px}
        .code-img-box{width:120px;height:48px;border-radius:8px;border:1px solid #e6e9ee;background:#fafafa;display:flex;align-items:center;justify-content:center;font-size:20px;letter-spacing:4px;color:#333;cursor:pointer}
        .login-btn{width:100%;background:#0082d9;color:#fff;border:none;border-radius:8px;padding:14px;font-size:17px;margin-top:14px;cursor:pointer}
        .notice-text{text-align:center;color:#333;margin-top:18px;font-size:16px}
        .footer-bar{position:fixed;left:0;right:0;bottom:0;background:#fff;padding:10px 20px;border-top:1px solid #eee;display:flex;align-items:center;justify-content:center}
        .footer-text{font-size:14px;color:#333}
        .error{color:#d9534f;font-size:13px;margin-top:6px}
        .field-group{display:flex;flex-direction:column}
        .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(0,0,0,0.8);color:#fff;padding:10px 14px;border-radius:8px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        /* Watermark container (background will tile the text) */
        .watermark{position:fixed;inset:0;display:block;z-index:9999;pointer-events:none;user-select:none;white-space:nowrap}
    </style>
</head>
<body>
    <div class="card" role="main" aria-labelledby="title">
        <div class="logo-box" aria-hidden="true"></div>
        <div id="title" class="system-title">湖北省高中阶段学校招生管理信息系统</div>

        <form id="loginForm" novalidate>
            <div class="input-wrap">
                <div class="field-group">
                    <div class="input-item">
                        <div class="icon-area">👤</div>
                        <div class="split-line"></div>
                        <input id="username" class="input-field" name="username" placeholder="请输入账号" autocomplete="username">
                    </div>
                    <div id="userError" class="error" aria-live="polite" style="display:none"></div>
                </div>

                <div class="field-group">
                    <div class="input-item">
                        <div class="icon-area">🔒</div>
                        <div class="split-line"></div>
                        <input id="password" class="input-field" name="password" type="password" placeholder="请输入密码" autocomplete="current-password">
                        <button id="togglePwd" type="button" class="eye-btn" aria-label="切换密码可见">👁</button>
                    </div>
                    <div id="pwdError" class="error" aria-live="polite" style="display:none"></div>
                </div>

                <div class="field-group">
                    <div class="code-row">
                        <div class="code-input-box">
                            <div class="icon-area">🛡️</div>
                            <div class="split-line"></div>
                            <input id="captchaInput" class="input-field" name="captcha" placeholder="请输入验证码">
                        </div>
                        <div id="captchaBox" class="code-img-box" title="点击刷新验证码" aria-hidden="false"></div>
                    </div>
                    <div id="captchaError" class="error" aria-live="polite" style="display:none"></div>
                </div>

                <button id="loginBtn" class="login-btn" type="submit">登录</button>
            </div>
        </form>

        <div class="notice-text">公告</div>
    </div>

    <div class="footer-bar">
        <div class="footer-text">湖北省高中阶段学校招生管理信息系统</div>
    </div>

    <div id="toast" class="toast" aria-live="polite" role="status">用户须知\n这不是官方系统\n这不是官方系统\n这不是官方系统\n所有操作和现实无关\n知晓以上内容后方可继续使用</div>

    <div id="watermark" class="watermark"></div>

    <script>
        (function(){
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            const captchaInput = document.getElementById('captchaInput');
            const captchaBox = document.getElementById('captchaBox');
            const loginForm = document.getElementById('loginForm');
            const togglePwd = document.getElementById('togglePwd');

            const userError = document.getElementById('userError');
            const pwdError = document.getElementById('pwdError');
            const captchaError = document.getElementById('captchaError');

            function genCaptcha(len=4){
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                let s = '';
                for(let i=0;i<len;i++) s += chars.charAt(Math.floor(Math.random()*chars.length));
                return s;
            }

            let currentCaptcha = '';
            function refreshCaptcha(){
                currentCaptcha = genCaptcha();
                captchaBox.textContent = currentCaptcha;
                captchaInput.value = '';
                captchaError.style.display = 'none';
            }

            captchaBox.addEventListener('click', refreshCaptcha);
            // allow clicking the image or pressing space/enter when focused
            captchaBox.tabIndex = 0;
            captchaBox.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' ') { e.preventDefault(); refreshCaptcha(); } });

            togglePwd.addEventListener('click', ()=>{
                if(password.type === 'password'){ password.type = 'text'; togglePwd.textContent = '🙈'; }
                else{ password.type = 'password'; togglePwd.textContent = '👁'; }
            });

            // Basic inline validation
            function showError(el, msg){ el.textContent = msg; el.style.display = 'block'; }
            function hideError(el){ el.textContent = ''; el.style.display = 'none'; }

            loginForm.addEventListener('submit', function(e){
                e.preventDefault();
                hideError(userError); hideError(pwdError); hideError(captchaError);

                const u = username.value.trim();
                const p = password.value.trim();
                const c = captchaInput.value.trim().toUpperCase();

                if(!u){ showError(userError,'请输入账号'); username.focus(); return; }
                if(!p){ showError(pwdError,'请输入密码'); password.focus(); return; }
                if(!c){ showError(captchaError,'请输入验证码'); captchaInput.focus(); return; }
                if(c !== currentCaptcha){ showError(captchaError,'验证码错误，请重试'); captchaInput.focus(); refreshCaptcha(); return; }

                // Save 报名号 (use username) so result page can display it
                try{ localStorage.setItem('regNo', u); }catch(e){}
                // All good — redirect to result page
                window.location.href = 'result.html';
            });

            // generate initial captcha on load
            refreshCaptcha();

            // show a small toast on first load
            function showToast(msg,ms){
                try{
                    var t = document.getElementById('toast');
                    if(!t) return;
                    t.textContent = msg;
                    setTimeout(function(){ t.classList.add('show'); }, 80);
                    setTimeout(function(){ t.classList.remove('show'); }, ms || 3000);
                }catch(e){}
            }
            showToast('用户须知！  这不是官方系统！这不是官方系统！这不是官方系统！  所有操作和现实无关！本站点不会存储你的个人信息！密码随便填写！  知晓以上内容后方可继续使用！  本弹窗将在12秒后消失', 12000);

            // add tiled watermark (copy of result page)
            try{
                var wm = document.getElementById('watermark');
                if(wm){
                    var svgW = 180, svgH = 160, fontSize = 16;
                    var fill = '%23888888';
                    var textOpacity = 0.18;
                    var svg = "<svg xmlns='http://www.w3.org/2000/svg' width='"+svgW+"' height='"+svgH+"'>"+
                              "<rect width='100%' height='100%' fill='transparent'/>"+
                              "<text x='"+(svgW/2)+"' y='"+(svgH/2)+"' font-family='sans-serif' font-size='"+fontSize+"' fill='"+fill+"' fill-opacity='"+textOpacity+"' text-anchor='middle' dominant-baseline='middle' transform='rotate(-30 "+(svgW/2)+" "+(svgH/2)+")'>非官方页面仅供娱乐</text>"+
                              "</svg>";
                    var data = 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
                    wm.style.backgroundImage = 'url("'+data+'")';
                    wm.style.backgroundRepeat = 'repeat';
                    wm.style.backgroundSize = '180px 160px';
                    wm.style.backgroundPosition = '0 0';
                    wm.textContent = '';
                }
            }catch(e){}
        })();
    </script>
</body>
</html>
