<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LumiNya 在线同学录</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      color: #1d1d1f;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      /* 为移动端底部导航栏留出安全距离 */
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px;
      width: 100%;
      flex: 1;
    }

    /* 导航栏 - 移动优先 */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
      margin-bottom: 32px;
      border-bottom: 1px solid #f0f0f5;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: #1d1d1f;
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .logo i {
      color: #007AFF;
      margin-right: 6px;
      font-size: 20px;
    }

    .nav-link {
      color: #007AFF;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      padding: 8px 0;
    }

    .nav-link:hover {
      text-decoration: underline;
    }

    /* 页面头部 */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 16px;
      color: #6e6e73;
      margin: 0 8px;
    }

    /* 卡片网格 - 移动端单列，桌面端双列 */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 48px;
    }

    @media (min-width: 640px) {
      .card-grid {
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }
    }

    /* 功能卡片 */
    .card {
      background: #ffffff;
      border: 1px solid #e5e5ea;
      border-radius: 20px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      /* 增大触控区域 */
      min-height: 160px;
    }

    .card:active {
      background: #f9f9fb;
      border-color: #007AFF;
    }

    @media (hover: hover) {
      .card:hover {
        border-color: #007AFF;
        box-shadow: 0 8px 24px rgba(0, 122, 255, 0.08);
        transform: translateY(-2px);
      }
    }

    .card-icon {
      font-size: 26px;
      color: #007AFF;
      margin-bottom: 18px;
      background: #f2f7ff;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card h2 {
      font-size: 19px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 14px;
      color: #6e6e73;
      line-height: 1.5;
    }

    /* 页脚 */
    footer {
      text-align: center;
      padding: 20px 0 24px;
      border-top: 1px solid #f0f0f5;
      margin-top: auto;
      font-size: 13px;
      color: #86868b;
    }

    footer a {
      color: #007AFF;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/" class="logo">
        <i class="fas fa-star"></i> LumiNya
      </a>
      <a href="/" class="nav-link">← 返回主页</a>
    </nav>

    <div class="header">
      <h1>📒 在线同学录</h1>
      <p>与同学保持联系，记录美好回忆</p>
    </div>

    <div class="card-grid">
      <a href="/classmate/myprofile.html" class="card">
        <div class="card-icon">
          <i class="fas fa-user"></i>
        </div>
        <h2>我的基本信息</h2>
        <p>填写或更新你的联系方式、简介，方便同学找到你。</p>
      </a>

      <a href="/classmate/invite.html" class="card">
        <div class="card-icon">
          <i class="fas fa-link"></i>
        </div>
        <h2>创建邀请链接</h2>
        <p>生成专属邀请链接，分享给其他同学一起加入填写。</p>
      </a>
    </div>
  </div>

  <footer>
    <p>© 2026 <a href="/">LumiNya</a> · 在线同学录系统</p>
  </footer>
</body>
</html>
