        body {

            padding: 15px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
        }

        .login-section {
            padding: 25px 20px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .quiz-section {
            padding: 25px 20px;
            display: none;
        }

        .progress {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #666;
            font-size: 15px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .question {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #333;
            text-align: center;
            line-height: 1.5;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        @media (min-width: 500px) {
            .options {
                grid-template-columns: 1fr 1fr;
            }
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #ddd;
            padding: 16px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            text-align: center;
        }

        .option:hover {
            border-color: #667eea;
            background: #e8f0fe;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .hidden {
            display: none !important;
        }

        .admin-section, .wrong-section {
            padding: 20px;
            border-top: 2px solid #eee;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .record-item, .wrong-item {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }

        .wrong-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .celebration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            z-index: 999;
            display: none;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }

        .tip {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 10px;
        }

</head>

            {w:"village",m:"村庄；乡村"},{w:"visit",m:"参观；访问"},{w:"visitor",m:"游客；访客"},
            {w:"voice",m:"声音；嗓音"},{w:"volleyball",m:"排球"},{w:"voyage",m:"航行；旅行"},
            {w:"wait",m:"等；等候"},{w:"wake",m:"醒；醒来；唤醒"},{w:"walk",m:"走；步行"},
            {w:"wall",m:"墙"},{w:"want",m:"要；想要"},{w:"war",m:"战争"},
            {w:"warm",m:"暖和的；温暖"},{w:"wash",m:"洗"},{w:"waste",m:"浪费；废物"},
            {w:"watch",m:"观看；注视；手表"},{w:"water",m:"水"},{w:"wave",m:"波浪；波动"},
            {w:"way",m:"路；方式；手段"},{w:"we",m:"我们"},{w:"weak",m:"弱的；差的"},
            {w:"wealth",m:"财富；财产"},{w:"wear",m:"穿；戴"},{w:"Wednesday",m:"星期三"},
            {w:"week",m:"星期；周"},{w:"weekend",m:"周末"},{w:"weigh",m:"称…的重量"},
            {w:"welcome",m:"欢迎"},{w:"well",m:"好；好吧；井"},{w:"west",m:"西方；西部"},
            {w:"wet",m:"湿的；潮湿"},{w:"whale",m:"鲸鱼"},{w:"what",m:"什么；多么"},
            {w:"wheat",m:"小麦"},{w:"when",m:"当…的时候"},{w:"where",m:"在哪里；往哪里"},
            {w:"whether",m:"是否"},{w:"which",m:"哪一个；哪些"},{w:"while",m:"在…时候；而"},
            {w:"white",m:"白色；白色的"},{w:"who",m:"谁"},{w:"whole",m:"整个的；全部"},
            {w:"whom",m:"谁（宾格）"},{w:"whose",m:"谁的"},{w:"why",m:"为什么"},
            {w:"wide",m:"宽阔的；广泛"},{w:"wife",m:"妻子"},{w:"wild",m:"野生的；未开发"},
            {w:"will",m:"将要；会；意愿"},{w:"win",m:"获胜；赢得"},{w:"wind",m:"风"},
            {w:"window",m:"窗户"},{w:"wine",m:"酒"},{w:"winter",m:"冬天；冬季"},
            {w:"wire",m:"电线；金属线"},{w:"wise",m:"聪明的；英明"},{w:"wish",m:"愿望；祝愿"},
            {w:"with",m:"和；带着；用"},{w:"within",m:"在…里面"},{w:"without",m:"没有；不"},
            {w:"woman",m:"妇女；女人"},{w:"wood",m:"木头；木材"},{w:"word",m:"词；单词；话"},
            {w:"work",m:"工作；运转"},{w:"worker",m:"工人；工作者"},{w:"world",m:"世界"},
            {w:"worry",m:"烦恼；担忧"},{w:"worth",m:"值得…的"},{w:"would",m:"将；会；愿意"},
            {w:"wound",m:"创伤；伤口"},{w:"write",m:"写；写作"},{w:"writer",m:"作家；作者"},
            {w:"wrong",m:"错误的；不对"},{w:"year",m:"年"},{w:"yellow",m:"黄色；黄色的"},
            {w:"yes",m:"是；是的"},{w:"yesterday",m:"昨天"},{w:"yet",m:"尚；还；仍然"},
            {w:"you",m:"你；你们"},{w:"young",m:"年轻的"},{w:"your",m:"你的；你们的"},
            {w:"yours",m:"你的；你们的（名词性）"},{w:"yourself",m:"你自己"},{w:"youth",m:"青春；青年"},
            {w:"zero",m:"零；零度"}
        ];

        // ====================== 核心变量 ======================
        let currentUser = null;
        let currentQuestion = 0, score = 0;
        const totalQuestions = 30; // 改为每组30题
        let currentQuizData = null;
        let isPracticingWrong = false;

        // ====================== 登录/退出 ======================
        function login() {
            const username = document.getElementById('username').value.trim();
            if (!username) { alert('请输入名字！'); return; }
            currentUser = username;
            document.getElementById('currentUser').textContent = `欢迎你，${currentUser}！`;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('userInfo').classList.remove('hidden');
            document.getElementById('quizSection').style.display = 'block';
            startQuiz();
        }

        function logout() {
            currentUser = null;
            currentQuestion = score = 0;
            isPracticingWrong = false;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('userInfo').classList.add('hidden');
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('wrongSection').classList.add('hidden');
            document.getElementById('username').value = '';
        }

        // ====================== 出题逻辑（双向题型+纯单词四选一） ======================
        function getRandomWords(count) {
            const arr = [...words];
            const result = [];
            for(let i=0; i<count; i++) {
                const idx = Math.floor(Math.random() * arr.length);
                result.push(arr[idx]);
                arr.splice(idx, 1);
            }
            return result;
        }

        function generateQuestion() {
            const [correct, ...others] = getRandomWords(4);
            const type = Math.random();
            
            let question, options;
            // 只保留两种题型：英译汉、汉译英
            if (type < 0.5) {
                // 英译汉
                question = `单词 "${correct.w}" 的中文意思是？`;
                options = [
                    {label: correct.m, isCorrect: true, word: correct.w, meaning: correct.m},
                    {label: others[0].m, isCorrect: false, word: others[0].w, meaning: others[0].m},
                    {label: others[1].m, isCorrect: false, word: others[1].w, meaning: others[1].m},
                    {label: others[2].m, isCorrect: false, word: others[2].w, meaning: others[2].m}
                ];
            } else {
                // 汉译英
                question = `意思是 "${correct.m}" 的英文单词是？`;
                options = [
                    {label: correct.w, isCorrect: true, word: correct.w, meaning: correct.m},
                    {label: others[0].w, isCorrect: false, word: others[0].w, meaning: others[0].m},
                    {label: others[1].w, isCorrect: false, word: others[1].w, meaning: others[1].m},
                    {label: others[2].w, isCorrect: false, word: others[2].w, meaning: others[2].m}
                ];
            }

            options.sort(() => Math.random() - 0.5);
            return { question, options, correct };
        }

        // 实时更新正确率
        function updateProgress() {
            const totalAnswered = currentQuestion + 1;
            const accuracy = totalAnswered > 0 ? Math.round((score / totalAnswered) * 100) : 0;
            document.getElementById('currentNum').textContent = currentQuestion + 1;
            document.getElementById('score').textContent = score;
            document.getElementById('accuracy').textContent = accuracy + '%';
        }

        // ====================== 答题流程 ======================
        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            isPracticingWrong = false;
            updateProgress();
            showQuestion();
        }

        function showQuestion() {
            if (currentQuestion >= totalQuestions) {
                finishQuiz();
                return;
            }
            updateProgress();
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('restartBtn').classList.add('hidden');
            
            currentQuizData = generateQuestion();
            document.getElementById('question').textContent = currentQuizData.question;
            const optContainer = document.getElementById('options');
            optContainer.innerHTML = '';

            currentQuizData.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt.label;
                div.onclick = () => checkAnswer(i);
                optContainer.appendChild(div);
            });
        }

        function checkAnswer(idx) {
            const opts = document.querySelectorAll('.option');
            const correctIdx = currentQuizData.options.findIndex(o => o.isCorrect);
            
            opts[correctIdx].classList.add('correct');
            opts.forEach(o => o.style.pointerEvents = 'none');

            if (idx === correctIdx) {
                score++;
                showCelebration();
            } else {
                opts[idx].classList.add('incorrect');
                saveWrong(currentQuizData.correct);
            }

            updateProgress(); // 即时计分
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestion++;
            showQuestion();
        }

        function finishQuiz() {
            const accuracy = ((score / totalQuestions) * 100).toFixed(0);
            saveRecord({
                username: currentUser,
                date: new Date().toLocaleString(),
                total: totalQuestions,
                correct: score,
                accuracy: accuracy + '%'
            });

            alert(`训练完成！\n姓名：${currentUser}\n得分：${score}/${totalQuestions}\n正确率：${accuracy}%`);
            document.getElementById('restartBtn').classList.remove('hidden');
        }

        function showCelebration() {
            const el = document.getElementById('celebration');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 1000);
        }

        // ====================== 记录保存 ======================
        function saveRecord(record) {
            let records = JSON.parse(localStorage.getItem('englishQuizRecords') || '[]');
            records.unshift(record);
            localStorage.setItem('englishQuizRecords', JSON.stringify(records));
        }

        // ====================== 错题本功能 ======================
        function saveWrong(word) {
            if (!currentUser) return;
            let wrong = JSON.parse(localStorage.getItem(`wrong_${currentUser}`) || '[]');
            const exist = wrong.some(item => item.w === word.w);
            if (!exist) {
                wrong.push(word);
                localStorage.setItem(`wrong_${currentUser}`, JSON.stringify(wrong));
            }
        }

        function showWrongBook() {
            if (!currentUser) { alert('请先登录！'); return; }
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('adminSection').classList.add('hidden');
            const wrong = JSON.parse(localStorage.getItem(`wrong_${currentUser}`) || '[]');
            const list = document.getElementById('wrongList');
            
            if (wrong.length === 0) {
                list.innerHTML = '<p>🎉 太棒了！你还没有错题～</p>';
            } else {
                list.innerHTML = wrong.map((item, i) => `
                    <div class="wrong-item">
                        <span>${i+1}. ${item.w} — ${item.m}</span>
                    </div>
                `).join('');
            }
            document.getElementById('wrongSection').classList.remove('hidden');
        }

        function hideWrong() {
            document.getElementById('wrongSection').classList.add('hidden');
            document.getElementById('quizSection').style.display = 'block';
        }

        function clearWrong() {
            if (!confirm('确定要清空所有错题吗？')) return;
            localStorage.removeItem(`wrong_${currentUser}`);
            showWrongBook();
        }

        function practiceWrong() {
            const wrong = JSON.parse(localStorage.getItem(`wrong_${currentUser}`) || '[]');
            if (wrong.length === 0) { alert('暂无错题可练习！'); return; }
            isPracticingWrong = true;
            currentQuestion = 0;
            score = 0;
            updateProgress();
            document.getElementById('wrongSection').classList.add('hidden');
            document.getElementById('quizSection').style.display = 'block';
            showQuestion();
        }

        // ====================== 管理员面板 ======================
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'm') {
                const pwd = prompt('请输入管理员密码：');
                if (pwd === 'admin123') showAdminRecords();
            }
        });

        function showAdminRecords() {
            const records = JSON.parse(localStorage.getItem('englishQuizRecords') || '[]');
            const list = document.getElementById('recordsList');
            list.innerHTML = records.length === 0 ? '<p>暂无训练记录</p>' : records.map(r => `
                <div class="record-item">
                    <strong>${r.username}</strong>｜${r.date}｜${r.correct}/${r.total}｜正确率：${r.accuracy}
                </div>
            `).join('');
            document.getElementById('adminSection').classList.remove('hidden');
        }

        function hideAdmin() {
            document.getElementById('adminSection').classList.add('hidden');
        }
    </script>
</body>
