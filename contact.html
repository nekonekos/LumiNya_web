<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>联系 · LumiNya</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 引入 Quill 富文本编辑器 -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <!-- 引入 SMTP.js 用于发送邮件 -->
    <script src="https://cdn.jsdelivr.net/npm/smtpjs@v3/smtp.js"></script>
    <style>
        /* ========== 全局样式 (完全沿用个人主页) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Helvetica Neue', 'Hiragino Sans', 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #d9f0f7;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1rem;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('/img/bg.webp'); /* 请确保图片存在 */
            background-size: cover;
            background-position: center 20%;
            background-repeat: no-repeat;
            filter: blur(12px) brightness(1.02);
            z-index: -1;
            pointer-events: none;
        }

        .page-wrap {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        /* 顶栏 (毛玻璃) */
        .top-bar {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 60px;
            padding: 1rem 2rem;
            text-align: center;
            font-weight: 650;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: #014c79;
            text-shadow: 2px 2px 6px rgba(255, 255, 255, 0.7);
        }
        .top-bar i {
            margin: 0 10px;
            color: #3d9fd3;
        }

        /* 通用毛玻璃卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.26);
            backdrop-filter: blur(14px) saturate(150%);
            -webkit-backdrop-filter: blur(14px) saturate(150%);
            border-radius: 36px;
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 40px -12px rgba(0, 100, 140, 0.25), 0 4px 18px rgba(255, 255, 255, 0.5) inset;
            padding: 2rem 2rem;
            color: #01486b;
        }

        /* 卡片标题 */
        .card-title {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }
        .card-title i {
            font-size: 2rem;
            color: #48b5e0;
        }
        .card-title h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #003f63;
            margin: 0;
        }

        /* 联系方式列表 */
        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .contact-item {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .contact-icon {
            width: 40px;
            font-size: 1.8rem;
            color: #1a76a8;
            text-align: center;
        }
        .contact-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: #014267;
            flex: 1;
        }
        .copy-btn {
            background: rgba(100, 190, 240, 0.6);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 40px;
            padding: 0.3rem 1rem;
            color: #003959;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .copy-btn:hover {
            background: rgba(70, 175, 235, 0.8);
        }
        .mail-link {
            color: #014267;
            text-decoration: none;
            border-bottom: 1px dotted #7cb8d4;
        }

        /* 表单组 */
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #014267;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 60px;
            font-size: 1rem;
            color: #003152;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #48b5e0;
            background: rgba(255, 255, 255, 0.6);
        }
        .form-control.error {
            border-color: #ff6b6b;
            background: rgba(255, 200, 200, 0.3);
        }
        .error-message {
            color: #d63031;
            font-size: 0.85rem;
            margin-top: 0.3rem;
            display: none;
        }
        .form-control.error + .error-message {
            display: block;
        }

        /* 联系方式选择行 */
        .contact-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .contact-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        .contact-select {
            width: 120px;
            padding: 0.8rem;
            background: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 60px;
            color: #014267;
            font-size: 1rem;
        }

        /* 富文本编辑器容器 */
        .quill-editor {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            overflow: hidden;
        }
        .ql-toolbar {
            background: rgba(255,255,255,0.3);
            border: none !important;
            border-bottom: 1px solid rgba(255,255,255,0.5) !important;
        }
        .ql-container {
            background: rgba(255,255,255,0.2);
            border: none !important;
            min-height: 150px;
            font-size: 1rem;
            color: #014267;
        }
        .ql-editor {
            min-height: 150px;
        }

        /* 提交按钮 */
        .submit-btn {
            background: rgba(100, 190, 240, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 60px;
            padding: 0.8rem 2.5rem;
            color: #003959;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            width: 100%;
            margin-top: 1rem;
        }
        .submit-btn:hover {
            background: rgba(70, 175, 235, 0.85);
            transform: translateY(-3px);
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 页脚 */
        .footer {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 1rem 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.7);
            color: #025a86;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1.5rem 2.5rem;
        }
        .footer a {
            color: #0f5f8a;
            text-decoration: none;
            border-bottom: 1px dotted #7cb8d4;
        }
        .footer i {
            margin-right: 5px;
        }

        /* 复制提示 Toast */
        .copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 90, 120, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 1rem;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .copy-toast.show {
            opacity: 1;
        }

        /* 响应式 */
        @media (max-width: 550px) {
            .top-bar { font-size: 1.5rem; padding: 0.8rem 1rem; }
            .glass-card { padding: 1.5rem; }
            .card-title h2 { font-size: 1.5rem; }
            .contact-text { font-size: 1rem; }
        }
        .caption-mini {
            font-size: 0.75rem; text-align: center; opacity: 0.7; margin-top: 0.5rem;
            background: rgba(255,255,240,0.2); backdrop-filter: blur(4px); border-radius: 40px; padding: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <!-- 顶栏 -->
        <div class="top-bar">
            <i class="fas fa-cherry-blossom"></i> 联系 LumiNya <i class="fas fa-fan"></i>
        </div>

        <!-- 卡片1：联系方式 -->
        <div class="glass-card">
            <div class="card-title">
                <i class="fas fa-address-card"></i>
                <h2>📞 联系方式</h2>
            </div>
            <div class="contact-list">
                <!-- QQ -->
                <div class="contact-item">
                    <div class="contact-icon"><i class="fab fa-qq"></i></div>
                    <span class="contact-text">1686157307</span>
                    <button class="copy-btn" onclick="copyText('1686157307')"><i class="fas fa-copy"></i> 复制</button>
                </div>
                <!-- 微信 -->
                <div class="contact-item">
                    <div class="contact-icon"><i class="fab fa-weixin"></i></div>
                    <span class="contact-text">LumiNyacc</span>
                    <button class="copy-btn" onclick="copyText('LumiNyacc')"><i class="fas fa-copy"></i> 复制</button>
                </div>
                <!-- 邮箱 -->
                <div class="contact-item">
                    <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                    <span class="contact-text"><a href="mailto:contact@luminya.cc" class="mail-link">contact@luminya.cc</a></span>
                    <span style="flex:1;"></span>
                </div>
            </div>
        </div>

        <!-- 卡片2：留言表单 -->
        <div class="glass-card">
            <div class="card-title">
                <i class="fas fa-pencil-alt"></i>
                <h2>📝 留言</h2>
            </div>

            <form id="contactForm">
                <!-- 标题 -->
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" class="form-control" id="title" placeholder="留言标题" required>
                </div>

                <!-- 联系方式 + 选择框 -->
                <div class="contact-row">
                    <div class="form-group" style="flex: 2;">
                        <label class="form-label">联系方式</label>
                        <input type="text" class="form-control" id="contactInput" placeholder="手机号 / 邮箱" required>
                        <div class="error-message" id="contactError"></div>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">类型</label>
                        <select class="contact-select" id="contactType">
                            <option value="phone">手机号</option>
                            <option value="email">邮箱</option>
                        </select>
                    </div>
                </div>

                <!-- 正文 (富文本编辑器) -->
                <div class="form-group">
                    <label class="form-label">正文</label>
                    <!-- 创建 Quill 编辑器容器 -->
                    <div id="editor-container" class="quill-editor"></div>
                </div>

                <!-- 提交按钮 -->
                <button type="button" class="submit-btn" id="submitBtn" onclick="sendMessage()">提 交</button>
            </form>
            <div style="margin-top: 1rem; font-size: 0.9rem; color: #015e94; text-align: right;">
                <i class="fas fa-heart" style="color: #ffa7c0;"></i> 我会尽快回复
            </div>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            <span><i class="far fa-copyright"></i> 2026 LumiNya</span>
            <span><i class="fas fa-tag"></i> 联系页</span>
            <span><a href="/"><i class="fas fa-dragon"></i> 返回首页</a></span>
            <span><a href="/about/"><i class="fas fa-map-signs"></i> 关于</a></span>
        </div>

        <!-- 复制提示 Toast -->
        <div id="copyToast" class="copy-toast">已复制到剪贴板</div>
        <!-- 操作提示 Toast (用于发送成功/失败) -->
        <div id="actionToast" class="copy-toast"></div>

        <!-- 小提示 -->
        <div class="caption-mini">
            ⭐ 点击复制按钮可复制QQ/微信号 · 留言支持富文本 · 发送后自动刷新 ⭐
        </div>
    </div>

    <script>
        // ==================== SMTP 配置 (请用户自行填写) ====================
        const SMTP_CONFIG = {
            host: "smtp.qq.com",      // SMTP服务器地址 (例如 smtp.qq.com)
            port: 587,                      // 端口 (常用587或465)
            user: "luminyaweb@qq.com",  // 发件邮箱账号
            pass: "vfxxingulqihbfic",           // 发件邮箱密码或授权码
            from: "luminyaweb@qq.com",  // 发件人地址
            to: "luminya.official@qq.com"           // 接收留言通知的邮箱 (可与上方不一致)
        };

        // ==================== 初始化富文本编辑器 ====================
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: '请输入留言内容...',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link', 'clean']
                ]
            }
        });

        // ==================== 工具函数 ====================
        // 显示 Toast (可指定不同容器)
        function showToast(message, isSuccess = true, toastId = 'copyToast') {
            const toast = document.getElementById(toastId);
            if (!toast) {
                console.warn('Toast element not found:', toastId);
                return;
            }
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 复制文本
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 复制成功', true, 'copyToast');
            }).catch(() => {
                // 降级
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast('✅ 复制成功', true, 'copyToast');
                } catch (err) {
                    showToast('❌ 复制失败', false, 'copyToast');
                }
                document.body.removeChild(textarea);
            });
        }

        // 获取客户端IP (使用 ipify.org)
        async function getClientIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) {
                console.error('获取IP失败', e);
                return null;  // 返回 null 表示获取失败
            }
        }

        // 校验手机号 (简单中国手机号)
        function isValidPhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }

        // 校验邮箱
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // 实时校验输入框
        function validateContact() {
            const input = document.getElementById('contactInput');
            const type = document.getElementById('contactType').value;
            const value = input.value.trim();
            let valid = false;
            if (type === 'phone') {
                valid = isValidPhone(value);
            } else {
                valid = isValidEmail(value);
            }
            if (!valid && value !== '') {
                input.classList.add('error');
                document.getElementById('contactError').textContent = type === 'phone' ? '请输入有效的手机号' : '请输入有效的邮箱';
            } else {
                input.classList.remove('error');
                document.getElementById('contactError').textContent = '';
            }
            return valid || value === ''; // 如果为空不标记错误，但在提交时会校验
        }

        // 绑定输入事件
        document.getElementById('contactInput').addEventListener('input', validateContact);
        document.getElementById('contactType').addEventListener('change', function() {
            validateContact();
        });

        // ==================== 发送留言 ====================
        async function sendMessage() {
            const submitBtn = document.getElementById('submitBtn');
            // 防止重复点击
            submitBtn.disabled = true;

            // 检查 SMTP.js 是否加载成功
            if (typeof Email === 'undefined') {
                showToast('❌ 邮件发送库未加载，请检查网络或刷新重试', false, 'actionToast');
                submitBtn.disabled = false;
                return;
            }

            // 获取表单值
            const title = document.getElementById('title').value.trim();
            const contactValue = document.getElementById('contactInput').value.trim();
            const contactType = document.getElementById('contactType').value;
            // 获取富文本内容 (HTML格式)
            const message = quill.root.innerHTML.trim();
            // 去除空标签等情况，简单判断是否有实际内容
            const plainText = quill.getText().trim();

            // 简单非空校验
            if (!title) {
                showToast('❌ 请输入标题', false, 'actionToast');
                submitBtn.disabled = false;
                return;
            }
            if (!contactValue) {
                showToast('❌ 请输入联系方式', false, 'actionToast');
                submitBtn.disabled = false;
                return;
            }
            if (!plainText) {
                showToast('❌ 请输入正文内容', false, 'actionToast');
                submitBtn.disabled = false;
                return;
            }

            // 校验联系方式格式
            let contactValid = false;
            if (contactType === 'phone') {
                contactValid = isValidPhone(contactValue);
            } else {
                contactValid = isValidEmail(contactValue);
            }
            if (!contactValid) {
                showToast('❌ 联系方式格式不正确', false, 'actionToast');
                submitBtn.disabled = false;
                return;
            }

            // 获取IP
            const ip = await getClientIP();
            if (!ip) {
                showToast('❌ 无法获取IP地址，发送已禁止', false, 'actionToast');
                submitBtn.disabled = false;
                return;
            }

            // 构造邮件内容
            const subject = `网站留言通知：${title}`;
            const body = `
                网站留言通知

                标题：${title}

                发送者ip地址：${ip}

                正文内容：
                ${message}

                联系方式：${contactType === 'phone' ? '手机号' : '邮箱'}：${contactValue}
            `;

            // 检查SMTP配置是否已修改
            if (SMTP_CONFIG.host === "smtp.example.com") {
                showToast('❌ 请先配置SMTP参数', false, 'actionToast');
                console.log('待发送内容：', body);
                submitBtn.disabled = false;
                return;
            }

            try {
                const result = await Email.send({
                    Host: SMTP_CONFIG.host,
                    Port: SMTP_CONFIG.port,
                    Username: SMTP_CONFIG.user,
                    Password: SMTP_CONFIG.pass,
                    To: SMTP_CONFIG.to,
                    From: SMTP_CONFIG.from,
                    Subject: subject,
                    Body: body
                });
                if (result === 'OK') {
                    showToast('✅ 留言发送成功！页面即将刷新', true, 'actionToast');
                    // 延时后刷新页面，让用户看到成功提示
                    setTimeout(() => {
                        location.reload();  // 强制刷新，清空所有内容
                    }, 1500);
                } else {
                    showToast('❌ 发送失败：' + result, false, 'actionToast');
                    submitBtn.disabled = false;
                }
            } catch (e) {
                showToast('❌ 发送异常：' + e.message, false, 'actionToast');
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
